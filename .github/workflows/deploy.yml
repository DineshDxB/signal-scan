name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Build
        env:
          VITE_SUPABASE_URL:      ${{ https://tdaqkrgvhrivomvbjral.supabase.co }}
          VITE_SUPABASE_ANON_KEY: ${{ eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkYXFrcmd2aHJpdm9tdmJqcmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTIwNzYsImV4cCI6MjA4OTc2ODA3Nn0.wQh0s2R5ZCItz8bEuTXW0GRTyKUVIUcRpKULCPQYDG4 }}
         
        run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
